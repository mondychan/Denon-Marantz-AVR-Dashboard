services:
  denon-dashboard:
    image: ghcr.io/mondychan/denon-marantz-avr-dashboard:latest
    # Multi-arch image: linux/amd64 and linux/arm64. Docker picks the host
    # architecture automatically; uncomment only if you need to pin it.
    #platform: linux/arm64/v8
    container_name: denon-dashboard
    restart: unless-stopped

    # ── Network Mode ───────────────────────────────────────────────────────────
    # WARNING: network_mode: host exposes ALL container ports to the host network.
    # Only use if you need SSDP auto-discovery. Prefer setting
    # DENON_DASHBOARD_DENON_HOST to the receiver IP and using bridge mode
    # (default) for better isolation.
    #network_mode: host

    ports:
      - "8080:8080"

    # ── Security hardening ────────────────────────────────────────────────────
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - denon-dashboard-data:/data

    environment:
      # ── Discovery ────────────────────────────────────────────────────────────
      # Leave empty for automatic SSDP discovery (requires network_mode: host).
      # Set to your receiver's IP if using bridge mode or auto-discovery doesn't work.
      - DENON_DASHBOARD_DENON_HOST=
      # Set to your Android TV / Google TV IP for automatic remote connection.
      #- DENON_DASHBOARD_ANDROID_TV_HOST=192.168.1.120
      # Optional ADB integration for screenshots, app launching and diagnostics.
      #- DENON_DASHBOARD_ANDROID_TV_ADB_ENABLED=true
      #- DENON_DASHBOARD_ANDROID_TV_ADB_PORT=5555

      # ── Port ─────────────────────────────────────────────────────────────────
      # Dashboard port (default 8080). Change if 8080 is taken on your host.
      #- DENON_DASHBOARD_PORT=8080

      # ── Optional ─────────────────────────────────────────────────────────────
      #- DENON_DASHBOARD_DENON_TELNET_PORT=23
      #- DENON_DASHBOARD_DENON_DEVICE_NAME=My Receiver
      #- DENON_DASHBOARD_DENON_ZONE1_NAME=Main Zone
      #- DENON_DASHBOARD_DENON_ZONE2_NAME=Zone 2
      #- DENON_DASHBOARD_DENON_SOURCE_NAMES={"GAME":"Game Console","TV":"TV Audio","NET":"Streaming","BD":"Blu-ray","BT":"Bluetooth"}
      #- DENON_DASHBOARD_ANDROID_TV_CLIENT_NAME=Denon Dashboard
      #- DENON_DASHBOARD_ANDROID_TV_ADB_STORAGE_DIR=/data/adb
      #- DENON_DASHBOARD_LOG_LEVEL=INFO

    # ── Traefik labels (optional) ─────────────────────────────────────────────
    # See compose.override.yaml for a working example with Traefik.
    #labels:
    #  - "traefik.enable=true"
    #  - "traefik.http.routers.denon-dashboard.rule=Host(`denon.example.com`)"
    #  - "traefik.http.routers.denon-dashboard.entrypoints=websecure"
    #  - "traefik.http.routers.denon-dashboard.tls=true"
    #  - "traefik.http.routers.denon-dashboard.tls.certresolver=letsencrypt"
    #  - "traefik.http.services.denon-dashboard.loadbalancer.server.port=8080"
    #networks:
    #  - traefik_proxy

#networks:
#  traefik_proxy:
#    external: true

volumes:
  denon-dashboard-data:
